# Nome visivel do workflow na aba Actions do GitHub.
name: PR Build

# Define os gatilhos que iniciam o pipeline.
on:
  # Executa este workflow quando um Pull Request e aberto, atualizado ou reaberto.
  pull_request:

permissions:
  # Permissao minima para checkout e leitura do codigo.
  contents: read
  # Permissao de leitura de metadados do PR.
  pull-requests: read

# Lista de jobs (tarefas) que o workflow executa.
jobs:
  # Job principal de build/validacao da aplicacao.
  build:
    # Runner hospedado pelo GitHub onde os passos serao executados.
    runs-on: ubuntu-latest

    # Sequencia de passos executados dentro do job.
    steps:
      # Baixa o codigo do repositorio para o runner.
      - name: Checkout repository
        # Pinado no commit SHA do release v4.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          # Usa o token nativo do GitHub Actions para autenticar o fetch do PR.
          token: ${{ github.token }}
          # Historico completo melhora a analise de PR/blame no SonarCloud.
          fetch-depth: 0

      # Instala e configura a versao do Python usada no pipeline.
      - name: Set up Python
        # Pinado no commit SHA do release v5.
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          # Versao do Python usada para build/validacao.
          python-version: "3.13"

      # Instala as dependencias da aplicacao.
      - name: Install dependencies
        run: |
          # Atualiza o pip para evitar problemas com instaladores antigos.
          python -m pip install --upgrade pip
          # Instala os pacotes definidos no requirements.txt.
          pip install -r requirements.txt

      # Executa validacoes de build da aplicacao Python/Flask.
      - name: Build and validate app
        run: |
          # Compila o arquivo Python para validar sintaxe/bytecode.
          python -m compileall app.py
          # Importa a app Flask e imprime o mapa de rotas para validar carregamento.
          python -c "from app import app; print(app.url_map)"
